name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: main-codeoff-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:11.8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v6

      - name: Find tests
        run: |
          echo "Finding tests"
          grep -rn "def test" > /dev/null

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: 'echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT'

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB Client
        run: |
          sudo apt update
          sudo apt-get install mariadb-client

      - name: Setup
        run: |
          pip install frappe-bench
          bench init --skip-redis-config-generation --skip-assets --python "$(which python)" ~/frappe-bench

      - name: Install
        working-directory: /home/runner/frappe-bench
        run: |
          bench get-app codeoff $GITHUB_WORKSPACE
          bench setup requirements --dev
          bench new-site --db-root-password root --admin-password admin test_site
          bench --site test_site install-app codeoff
          bench build
        env:
          CI: 'Yes'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app codeoff --coverage
        env:
          TYPE: server

      - name: Coverage Report
        working-directory: /home/runner/frappe-bench/sites
        run: |
          ../env/bin/coverage report --include="*/codeoff/*" --skip-empty
          ../env/bin/coverage xml --include="*/codeoff/*" -o $GITHUB_WORKSPACE/coverage.xml

      - name: Coverage Badge
        if: github.ref == 'refs/heads/main'
        working-directory: /home/runner/frappe-bench/sites
        run: |
          COV=$(../env/bin/coverage report --include="*/codeoff/*" --skip-empty | grep '^TOTAL' | grep -oP '\d+%' | tr -d '%')
          echo "Coverage: ${COV}%"
          if [ "$COV" -ge 80 ] 2>/dev/null; then COLOR="brightgreen"
          elif [ "$COV" -ge 60 ] 2>/dev/null; then COLOR="yellow"
          else COLOR="red"; fi
          curl -s "https://img.shields.io/badge/coverage-${COV}%25-${COLOR}" > $GITHUB_WORKSPACE/badge.svg
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan coverage-badge
          git rm -rf . > /dev/null 2>&1 || true
          mv badge.svg badge.svg.tmp && mv badge.svg.tmp badge.svg
          git add badge.svg
          git commit -m "Update coverage badge: ${COV}%"
          git push -f origin coverage-badge
